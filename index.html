<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>軟創行事曆系統</title>
    <style>
      /* --- 全域設定 --- */
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      /* --- 主題定義 --- */
      :root {
        /* 預設：科技風 (Tech) */
        --bg-body: #020408;
        --bg-container: rgba(13, 17, 23, 0.8);
        --bg-controls: rgba(22, 27, 34, 0.9);
        --text-main: #e6edf3;
        --text-secondary: #8b949e;
        --text-placeholder: #484f58;
        --border-color: #30363d;
        --accent: #58a6ff;
        --accent-neon: #00f2ff;
        --accent-glow: rgba(0, 242, 255, 0.3);
        --danger: #f85149;
        --success: #3fb950;
        --table-border: #21262d;
        --header-bg: #161b22;
        --header-text: #58a6ff;
        --row-bg: transparent;
        --row-hover: rgba(88, 166, 255, 0.05);
        --btn-bg: #21262d;
        --btn-text: #c9d1d9;
        --btn-hover: #30363d;
        --grid-opacity: 0.03;
      }

      body.theme-dark {
        --bg-body: #0a0a0a;
        --bg-container: #121212;
        --bg-controls: #1e1e1e;
        --text-main: #ffffff;
        --text-secondary: #aaaaaa;
        --text-placeholder: #555555;
        --border-color: #333333;
        --accent: #bb86fc;
        --accent-neon: #bb86fc;
        --accent-glow: rgba(187, 134, 252, 0.2);
        --table-border: #222222;
        --header-bg: #252525;
        --header-text: #bb86fc;
        --row-hover: rgba(187, 134, 252, 0.05);
        --btn-bg: #2c2c2c;
        --btn-text: #e0e0e0;
        --btn-hover: #383838;
        --grid-opacity: 0;
      }

      body.theme-white {
        --bg-body: #f0f2f5;
        --bg-container: #ffffff;
        --bg-controls: #f8f9fa;
        --text-main: #000000;
        --text-secondary: #333333;
        --text-placeholder: #666666;
        --border-color: #cccccc;
        --accent: #1877f2;
        --accent-neon: #1877f2;
        --accent-glow: rgba(24, 119, 242, 0.1);
        --table-border: #e0e0e0;
        --header-bg: #eeeeee;
        --header-text: #000000;
        --row-hover: rgba(0, 0, 0, 0.03);
        --btn-bg: #e4e6eb;
        --btn-text: #000000;
        --btn-hover: #d8dadf;
        --grid-opacity: 0;
      }

      /* --- 1. 基礎設定 --- */
      * {
        box-sizing: border-box;
      }

      body {
        font-family: 'Segoe UI', Roboto, 'Microsoft JhengHei', monospace;
        margin: 0;
        padding: 0;
        background-color: var(--bg-body);
        background-image: 
          linear-gradient(rgba(0, 242, 255, var(--grid-opacity)) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 242, 255, var(--grid-opacity)) 1px, transparent 1px);
        background-size: 30px 30px;
        color: var(--text-main);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        overflow-x: hidden;
        transition: background-color 0.3s, color 0.3s;
      }

      .container {
        width: 100%;
        max-width: 1200px;
        background: var(--bg-container);
        backdrop-filter: blur(10px);
        padding: 40px 20px;
        min-height: 100vh;
        position: relative;
        display: flex;
        flex-direction: column;
        box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
      }

      /* --- 掃描線效果 --- */
      .container::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--accent-neon), transparent);
        opacity: 0.1;
        animation: scan 8s linear infinite;
        pointer-events: none;
        z-index: 10;
      }

      @keyframes scan {
        0% { top: 0; }
        100% { top: 100%; }
      }

      /* --- 三槓選單樣式 --- */
      .menu-container {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 1000;
      }

      .menu-btn {
        background: var(--bg-controls);
        border: 1px solid var(--border-color);
        padding: 10px 15px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 18px;
        color: var(--accent-neon);
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 8px;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-weight: bold;
      }

      .menu-btn:hover {
        background-color: var(--btn-hover);
        box-shadow: 0 0 15px var(--accent-glow);
        border-color: var(--accent-neon);
      }

      .dropdown-menu {
        display: none;
        position: absolute;
        top: 100%;
        left: 0;
        background-color: var(--bg-controls);
        border: 1px solid var(--border-color);
        border-radius: 4px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        min-width: 160px;
        margin-top: 10px;
        overflow: hidden;
        backdrop-filter: blur(15px);
      }

      .dropdown-menu.show {
        display: block;
        animation: slideDown 0.2s ease-out;
      }

      @keyframes slideDown {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .dropdown-item {
        width: 100%;
        padding: 14px 20px;
        text-align: left;
        background: none;
        border: none;
        cursor: pointer;
        color: var(--text-main);
        font-size: 14px;
        transition: all 0.2s;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .dropdown-item:hover {
        background-color: rgba(0, 242, 255, 0.1);
        color: var(--accent-neon);
        padding-left: 25px;
      }

      h2 {
        text-align: center;
        color: var(--text-main);
        margin: 40px 0 10px 0;
        font-size: 32px;
        letter-spacing: 4px;
        text-transform: uppercase;
        font-weight: 800;
        background: linear-gradient(90deg, #fff, var(--accent-neon), #fff);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: shine 5s linear infinite;
      }

      @keyframes shine {
        to { background-position: 200% center; }
      }

      /* --- 科技風跑馬燈 (Ticker) --- */
      .ticker-container {
        width: 100%;
        background: rgba(0, 242, 255, 0.05);
        border-top: 1px solid var(--accent-glow);
        border-bottom: 1px solid var(--accent-glow);
        padding: 8px 0;
        margin-bottom: 30px;
        overflow: hidden;
        white-space: nowrap;
        position: relative;
      }

      .ticker-content {
        display: inline-flex;
        animation: ticker-ltr 30s linear infinite;
        color: var(--accent-neon);
        font-family: 'JetBrains Mono', monospace;
        font-size: 14px;
        letter-spacing: 1px;
        padding-left: 100%;
      }

      @keyframes ticker-ltr {
        0% { transform: translateX(0); }
        100% { transform: translateX(-100%); }
      }

      .ticker-item {
        display: inline-block;
        margin-right: 50px;
        background: rgba(0, 242, 255, 0.1);
        padding: 2px 25px 2px 15px;
        border-left: 3px solid var(--accent-neon);
        clip-path: polygon(0 0, 90% 0, 100% 50%, 90% 100%, 0 100%);
      }

      .ticker-item span {
        color: var(--accent-neon);
        margin-right: 10px;
        font-weight: bold;
        font-family: 'JetBrains Mono', monospace;
      }

      /* --- 2. 篩選器與工具列 --- */
      .controls-section {
        margin-bottom: 30px;
        padding: 25px;
        background-color: var(--bg-controls);
        border-radius: 4px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        border: 1px solid var(--border-color);
        position: relative;
      }

      .controls-section::after {
        content: "";
        position: absolute;
        bottom: -1px;
        left: 10%;
        width: 80%;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--accent-neon), transparent);
      }

      .search-box {
        display: flex;
        align-items: center;
        width: 100%;
        max-width: 600px;
        position: relative;
      }

      .search-box input {
        width: 100%;
        padding: 14px 15px 14px 50px;
        border: 1px solid var(--border-color);
        background-color: rgba(0, 0, 0, 0.3);
        color: var(--text-main);
        border-radius: 4px;
        font-size: 16px;
        transition: all 0.3s;
      }

      .search-box input:focus {
        outline: none;
        border-color: var(--accent-neon);
        box-shadow: 0 0 15px var(--accent-glow);
        background-color: rgba(0, 0, 0, 0.5);
      }

      .search-icon {
        position: absolute;
        left: 18px;
        color: var(--accent-neon);
        pointer-events: none;
        font-size: 18px;
      }

      /* 管理員新增/編輯資料表單 */
      .admin-form {
        display: none;
        width: 100%;
        max-width: 600px;
        background: rgba(0, 0, 0, 0.4);
        padding: 20px;
        border-radius: 4px;
        border: 1px solid var(--accent-neon);
        margin-top: 10px;
        animation: fadeIn 0.3s ease;
        box-shadow: inset 0 0 20px rgba(0, 242, 255, 0.05);
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.98); }
        to { opacity: 1; transform: scale(1); }
      }

      .admin-form.active {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      .admin-form h3 {
        margin: 0 0 15px 0;
        font-size: 16px;
        color: var(--accent-neon);
        display: flex;
        align-items: center;
        gap: 10px;
        text-transform: uppercase;
        letter-spacing: 2px;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
        width: 100%;
      }

      .admin-form input, .admin-form select {
        width: 100%;
        padding: 12px;
        border: 1px solid var(--border-color);
        border-radius: 4px;
        background: var(--bg-body);
        color: var(--text-main);
        font-size: 14px;
      }

      .admin-form input:focus {
        outline: none;
        border-color: var(--accent-neon);
      }

      .admin-form-actions {
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        margin-top: 15px;
      }

      /* --- 3. 表格核心樣式 --- */
      .table-wrapper {
        overflow-x: auto;
        width: 100%;
        border-radius: 4px;
        border: 1px solid var(--border-color);
        background: rgba(0, 0, 0, 0.2);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 600px;
      }

      th, td {
        padding: 18px 20px;
        text-align: left;
        border-bottom: 1px solid var(--table-border);
        font-size: 14px;
      }

      thead tr {
        background-color: var(--header-bg);
      }

      thead th {
        color: var(--header-text);
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 2px;
        font-size: 12px;
        border-bottom: 2px solid var(--accent-neon);
      }

      tbody tr {
        transition: all 0.2s;
      }

      tbody tr:hover {
        background-color: var(--row-hover);
        box-shadow: inset 4px 0 0 var(--accent-neon);
      }

      .action-btns {
        display: flex;
        gap: 8px;
        opacity: 0;
        transition: opacity 0.2s;
      }

      tr:hover .action-btns {
        opacity: 1;
      }

      .icon-btn {
        background: none;
        border: 1px solid var(--border-color);
        color: var(--text-secondary);
        padding: 6px;
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .icon-btn:hover {
        border-color: var(--accent-neon);
        color: var(--accent-neon);
        background: rgba(0, 242, 255, 0.1);
      }

      .icon-btn.delete:hover {
        border-color: var(--danger);
        color: var(--danger);
        background: rgba(248, 81, 73, 0.1);
      }

      .status-message {
        text-align: center;
        padding: 60px;
        color: var(--text-placeholder);
        letter-spacing: 1px;
      }

      /* --- 4. 分頁控制按鈕 --- */
      .pagination-controls {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 30px;
        padding: 40px 0;
        margin-top: auto;
      }

      .btn {
        padding: 10px 25px;
        border: 1px solid var(--border-color);
        background-color: var(--btn-bg);
        color: var(--btn-text);
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .btn:hover:not(:disabled) {
        background-color: var(--btn-hover);
        border-color: var(--accent-neon);
        color: var(--accent-neon);
        box-shadow: 0 0 10px var(--accent-glow);
      }

      .btn:disabled {
        opacity: 0.2;
        cursor: not-allowed;
      }

      .btn-primary {
        background-color: rgba(0, 242, 255, 0.1);
        color: var(--accent-neon);
        border: 1px solid var(--accent-neon);
      }

      .btn-primary:hover {
        background-color: var(--accent-neon);
        color: #000;
        box-shadow: 0 0 20px var(--accent-glow);
      }

      .current-month-display {
        font-size: 24px;
        font-weight: 900;
        color: var(--accent-neon);
        min-width: 120px;
        text-align: center;
        text-shadow: 0 0 15px var(--accent-glow);
      }

      /* --- 管理員登入彈窗 --- */
      .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(5px);
        z-index: 2000;
        justify-content: center;
        align-items: center;
      }

      .modal-content {
        background: var(--bg-controls);
        border: 1px solid var(--accent-neon);
        padding: 30px;
        border-radius: 8px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 0 30px var(--accent-glow);
        text-align: center;
      }

      .modal-content h3 {
        color: var(--accent-neon);
        margin-top: 0;
        margin-bottom: 20px;
        letter-spacing: 2px;
      }

      .modal-content input {
        width: 100%;
        padding: 12px;
        margin-bottom: 20px;
        background: var(--bg-body);
        border: 1px solid var(--border-color);
        color: var(--text-main);
        border-radius: 4px;
        text-align: center;
        font-size: 18px;
        letter-spacing: 5px;
      }

      .modal-actions {
        display: flex;
        gap: 10px;
        justify-content: center;
      }

      /* =========================================
               📱 5. 響應式設計 (針對手機與平板)
               ========================================= */
      @media (max-width: 768px) {
        .container {
          padding: 80px 15px 20px 15px;
          border: none;
        }

        h2 {
          font-size: 24px;
          margin-top: 20px;
        }

        .menu-container {
          top: 15px;
          left: 15px;
        }

        .menu-btn {
          padding: 8px 12px;
          font-size: 14px;
        }

        .controls-section {
          padding: 15px;
        }

        .search-box input {
          font-size: 14px;
          padding: 12px 12px 12px 45px;
        }

        .form-grid {
          grid-template-columns: 1fr;
        }

        .form-grid label {
          grid-column: span 1 !important;
        }

        .table-wrapper {
          border: none;
          background: transparent;
        }

        table {
          min-width: 100% !important;
        }

        thead {
          display: none;
        }

        tr {
          display: flex;
          flex-wrap: wrap;
          padding: 15px 5px;
          border-bottom: 1px solid var(--table-border);
          width: 100%;
          margin-bottom: 10px;
          background: rgba(255, 255, 255, 0.02);
          border-radius: 8px;
        }

        td {
          border: none !important;
          padding: 4px 8px !important;
          box-sizing: border-box;
        }

        /* 日期 */
        td:nth-child(1) {
          width: 15%;
          font-size: 11px;
          color: var(--text-secondary);
          padding-right: 0 !important;
          font-family: 'JetBrains Mono', monospace;
        }

        /* 課程 */
        td:nth-child(2) {
          width: 85%;
          text-align: left;
          padding-left: 0 !important;
          font-size: 14px;
          font-weight: bold;
          color: var(--accent-neon);
        }

        /* 項目 (移至下一行) */
        td:nth-child(3) {
          width: 100%;
          font-size: 16px;
          margin-top: 8px;
          color: var(--text-main);
          background: rgba(0, 242, 255, 0.08);
          border-radius: 4px;
          padding: 12px !important;
          border-left: 3px solid var(--accent-neon) !important;
        }

        /* 備註 (隱藏或顯示在最下方) */
        td:nth-child(4) {
          display: block;
          width: 100%;
          font-size: 12px;
          opacity: 0.8;
          color: var(--text-secondary);
          padding-top: 8px !important;
        }

        /* 操作按鈕 */
        td:nth-child(5) {
          width: 100%;
          display: flex;
          justify-content: flex-end;
          margin-top: 10px;
          padding-top: 10px !important;
          border-top: 1px solid rgba(255, 255, 255, 0.05) !important;
        }

        .action-btns {
          opacity: 1;
        }

        .pagination-controls {
          gap: 15px;
        }

        .btn {
          padding: 8px 15px;
          font-size: 12px;
        }

        .current-month-display {
          font-size: 20px;
          min-width: 80px;
        }
      }
    </style>
  </head>

  <body>
    <!-- 管理員登入彈窗 -->
    <div id="loginModal" class="modal-overlay">
      <div class="modal-content">
        <h3>系統存取授權</h3>
        <input type="password" id="adminPassword" placeholder="輸入存取密鑰" />
        <div class="modal-actions">
          <button class="btn" onclick="closeLoginModal()">取消</button>
          <button class="btn btn-primary" onclick="verifyPassword()">授權</button>
        </div>
      </div>
    </div>

      <div class="container">
      <!-- 三槓選單 -->
      <div class="menu-container">
        <button class="menu-btn" id="menuBtn" onclick="toggleMenu()" aria-label="選單">
          <span>☰</span> 選單
        </button>
        <div class="dropdown-menu" id="dropdownMenu">
          <button class="dropdown-item" id="adminToggleBtn" onclick="handleAdminClick()">
            <span id="adminBtnIcon">🛡️</span> <span id="adminBtnText">管理員模式</span>
          </button>
          <button class="dropdown-item" id="examFilterBtn" onclick="toggleExamFilter()">
            <span id="examFilterIcon">📝</span> <span id="examFilterText">只顯示考試</span>
          </button>
          <div style="padding: 10px 20px; font-size: 11px; color: var(--text-secondary); border-bottom: 1px solid rgba(255,255,255,0.05);">色彩模式</div>
          <button class="dropdown-item" onclick="setTheme('tech')">
            <span>💠</span> 科技風
          </button>
          <button class="dropdown-item" onclick="setTheme('dark')">
            <span>🌙</span> 深色模式
          </button>
          <button class="dropdown-item" onclick="setTheme('white')">
            <span>☀️</span> 白色模式
          </button>
        </div>
      </div>

      <!-- 狀態顯示 (僅管理員可見) -->
      <div id="adminStatus" style="display: none; position: absolute; top: 65px; left: 20px; font-size: 11px; color: var(--success); font-family: monospace; letter-spacing: 1px;">
        [ 狀態: 已授權管理員存取 ]
      </div>

      <h2>軟創行事曆系統</h2>

      <!-- 科技風跑馬燈 -->
      <div class="ticker-container">
        <div class="ticker-content" id="tickerContent">
          <!-- 動態產生最近事項 -->
        </div>
      </div>

      <!-- 上方：搜尋 -->
      <div class="controls-section">
        <div class="search-box">
          <span class="search-icon">⚡</span>
          <input
            type="text"
            id="searchInput"
            placeholder="查詢課程>>>"
            autocomplete="off"
          />
        </div>

        <!-- 管理員新增/編輯表單 -->
        <div id="adminForm" class="admin-form">
          <h3 id="formTitle">➕ 初始化新事件</h3>
          <input type="hidden" id="editId" value="" />
          <div class="form-grid">
            <select id="newMonth">
              <option value="">選擇月份</option>
              <option value="01">01月</option>
              <option value="02">02月</option>
              <option value="03">03月</option>
              <option value="04">04月</option>
              <option value="05">05月</option>
              <option value="06">06月</option>
              <option value="07">07月</option>
              <option value="08">08月</option>
              <option value="09">09月</option>
              <option value="10">10月</option>
              <option value="11">11月</option>
              <option value="12">12月</option>
            </select>
            <input type="date" id="newDate" />
            <input type="text" id="newCourse" placeholder="課程名稱" />
            <input type="text" id="newTodo" placeholder="任務 / 事件項目" />
            <input type="text" id="newNote" placeholder="備註 / 元數據" />
            <label style="display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--text-main); cursor: pointer; grid-column: span 2;">
              <input type="checkbox" id="newIsExam" style="width: 18px; height: 18px; cursor: pointer;" />
              標記為考試
            </label>
          </div>
          <div class="admin-form-actions">
            <button class="btn" onclick="resetForm()">清除</button>
            <button class="btn btn-primary" id="submitBtn" onclick="handleFormSubmit()">執行</button>
          </div>
        </div>
      </div>

      <!-- 表格區塊 -->
      <div class="table-wrapper">
        <table id="scheduleTable">
          <thead>
            <tr>
              <th style="width: 15%">日期</th>
              <th style="width: 25%">課程</th>
              <th style="width: 35%">項目</th>
              <th style="width: 25%">備註</th>
              <th id="adminHeader" style="width: 15%; display: none;">操作</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <!-- JavaScript 自動產生內容 -->
          </tbody>
        </table>
      </div>

      <!-- 下方：月份切換 -->
      <div class="pagination-controls" id="paginationControls">
        <button class="btn" id="prevBtn" onclick="changeMonth(-1)">
          上個月
        </button>
        <span class="current-month-display" id="monthDisplay">...</span>
        <button class="btn" id="nextBtn" onclick="changeMonth(1)">
          下個月
        </button>
      </div>
    </div>

    <script>
      // --- 1. 資料區 ---
      const initialData = [
        { id: 1, date: "2026/04/11", course: "國文", todo: "習作一（飲食札記）", note: "", isExam: false },
        { id: 2, date: "2026/04/11", course: "程式設計(二)", todo: "上機考", note: "", isExam: true },
        { id: 3, date: "2026/04/16", course: "作業系統概論", todo: "期中考", note: "範圍：1, 4, 5, 6", isExam: true },
        { id: 4, date: "2026/04/17", course: "英文", todo: "期中考", note: "範圍：單元7-9", isExam: true },
        { id: 5, date: "2026/04/22", course: "Python程式設計", todo: "期中考", note: "", isExam: true },
        { id: 6, date: "2026/05/16", course: "國文", todo: "分組報告", note: "", isExam: false },
        { id: 7, date: "2026/05/16", course: "程式設計(二)", todo: "上機考", note: "", isExam: true },
        { id: 8, date: "2026/05/22", course: "英文", todo: "口頭報告", note: "33-21號", isExam: false },
        { id: 9, date: "2026/05/29", course: "英文", todo: "口頭報告", note: "20-1號", isExam: false },
        { id: 10, date: "2026/05/23", course: "國文", todo: "分組報告、習作二", note: "", isExam: false },
        { id: 11, date: "2026/05/30", course: "國文", todo: "分組報告", note: "", isExam: false },
        { id: 12, date: "2026/06/10", course: "Python程式設計", todo: "期末考", note: "", isExam: true },
        { id: 13, date: "2026/06/11", course: "作業系統概論", todo: "期末考", note: "範圍：2, 3, 7, 8", isExam: true },
        { id: 14, date: "2026/06/12", course: "英文", todo: "期末考", note: "範圍：單元10-12", isExam: true },
        { id: 15, date: "2026/06/13", course: "國文", todo: "期末考", note: "", isExam: true },
        { id: 16, date: "2026/06/13", course: "程式設計(二)", todo: "上機考", note: "", isExam: true },
      ];

      let scheduleData = JSON.parse(localStorage.getItem('scheduleData')) || initialData;

      // --- 全域變數 ---
      let currentMonthIndex = 0;
      let uniqueMonths = [];
      let isSearching = false;
      let isAdmin = false;
      let isEditing = false;
      let sessionAuthorized = false; // 記錄本次會話是否已授權
      let isExamFilterActive = false; // 是否只顯示考試

      const tableBody = document.getElementById("tableBody");
      const searchInput = document.getElementById("searchInput");
      const monthDisplay = document.getElementById("monthDisplay");
      const prevBtn = document.getElementById("prevBtn");
      const nextBtn = document.getElementById("nextBtn");
      const dropdownMenu = document.getElementById("dropdownMenu");
      const adminForm = document.getElementById("adminForm");
      const adminStatus = document.getElementById("adminStatus");
      const adminHeader = document.getElementById("adminHeader");
      const submitBtn = document.getElementById("submitBtn");
      const formTitle = document.getElementById("formTitle");
      const loginModal = document.getElementById("loginModal");
      const tickerContent = document.getElementById("tickerContent");

      // --- 2. 初始化邏輯 ---
      function initApp() {
        // 載入主題
        const savedTheme = localStorage.getItem('appTheme') || 'tech';
        setTheme(savedTheme);

        updateUniqueMonths();
        updateTicker();
        if (uniqueMonths.length > 0) {
          currentMonthIndex = 0;
          renderMonthView();
        } else {
          renderTable([]);
          monthDisplay.textContent = "無數據";
          togglePagination(false);
        }
      }

      function setTheme(theme) {
        document.body.classList.remove('theme-dark', 'theme-white');
        if (theme === 'dark') {
          document.body.classList.add('theme-dark');
        } else if (theme === 'white') {
          document.body.classList.add('theme-white');
        }
        localStorage.setItem('appTheme', theme);
      }

      function updateUniqueMonths() {
        const monthsSet = new Set();
        scheduleData.forEach((item) => {
          if (item.date && item.date.length >= 7) {
            // 處理 YYYY-MM-DD 或 YYYY/MM/DD
            const separator = item.date.includes("-") ? "-" : "/";
            monthsSet.add(item.date.substring(0, 7).replace("-", "/"));
          }
        });
        uniqueMonths = Array.from(monthsSet).sort();
      }

      function updateTicker() {
        tickerContent.innerHTML = "";
        const now = new Date();
        const todayStr = now.getFullYear() + "/" + String(now.getMonth() + 1).padStart(2, '0') + "/" + String(now.getDate()).padStart(2, '0');
        
        // 找出今天及以後的最近 1 個考試事項
        const upcoming = scheduleData
          .filter(item => item.isExam && item.date.replace(/-/g, '/') >= todayStr)
          .sort((a, b) => a.date.localeCompare(b.date))
          .slice(0, 1); 

        if (upcoming.length === 0) {
          tickerContent.innerHTML = '<div class="ticker-item"><span>[ 系統通知 ]</span> 目前無近期考試，系統運作正常。</div>';
          return;
        }

        upcoming.forEach(item => {
          const div = document.createElement("div");
          div.className = "ticker-item";
          div.innerHTML = `<span>[ 最近考試: ${item.date.replace(/-/g, '/')} ]</span> ${item.course} - ${item.todo}`;
          tickerContent.appendChild(div);
        });
      }

      // --- 3. 選單與管理員邏輯 ---
      function toggleMenu() {
        dropdownMenu.classList.toggle("show");
      }

      window.onclick = function(event) {
        if (!event.target.closest('.menu-container')) {
          if (dropdownMenu.classList.contains('show')) {
            dropdownMenu.classList.remove('show');
          }
        }
      }

      function toggleExamFilter() {
        isExamFilterActive = !isExamFilterActive;
        const btn = document.getElementById("examFilterBtn");
        const text = document.getElementById("examFilterText");
        const icon = document.getElementById("examFilterIcon");

        if (isExamFilterActive) {
          btn.style.backgroundColor = "rgba(0, 242, 255, 0.2)";
          text.textContent = "顯示所有項目";
          icon.textContent = "📋";
        } else {
          btn.style.backgroundColor = "";
          text.textContent = "只顯示考試";
          icon.textContent = "📝";
        }
        
        renderMonthView();
        dropdownMenu.classList.remove("show");
      }

      function handleAdminClick() {
        if (isAdmin) {
          exitAdminMode();
        } else {
          if (sessionAuthorized) {
            activateAdminUI();
          } else {
            openLoginModal();
          }
        }
      }

      function openLoginModal() {
        loginModal.style.display = "flex";
        document.getElementById("adminPassword").focus();
      }

      function closeLoginModal() {
        loginModal.style.display = "none";
        document.getElementById("adminPassword").value = "";
      }

      function verifyPassword() {
        const pass = document.getElementById("adminPassword").value;
        if (pass === "514") {
          sessionAuthorized = true;
          activateAdminUI();
          closeLoginModal();
        } else {
          alert("授權失敗：存取密鑰錯誤。");
        }
      }

      function activateAdminUI() {
        isAdmin = true;
        document.body.classList.add("admin-active");
        adminForm.classList.add("active");
        adminStatus.style.display = "block";
        adminHeader.style.display = "table-cell";
        document.getElementById("adminBtnText").textContent = "登出管理員";
        document.getElementById("adminBtnIcon").textContent = "🔓";
        renderMonthView();
      }

      function exitAdminMode() {
        isAdmin = false;
        document.body.classList.remove("admin-active");
        adminForm.classList.remove("active");
        adminStatus.style.display = "none";
        adminHeader.style.display = "none";
        document.getElementById("adminBtnText").textContent = "管理員模式";
        document.getElementById("adminBtnIcon").textContent = "🛡️";
        resetForm();
        renderMonthView();
      }

      function handleFormSubmit() {
        if (isEditing) {
          saveEdit();
        } else {
          addNewItem();
        }
      }

      function addNewItem() {
        const date = document.getElementById("newDate").value.trim();
        const course = document.getElementById("newCourse").value.trim();
        const todo = document.getElementById("newTodo").value.trim();
        const note = document.getElementById("newNote").value.trim();
        const isExam = document.getElementById("newIsExam").checked;

        if (!date || !course || !todo) {
          alert("錯誤：請填寫日期、課程與項目。");
          return;
        }

        // 統一存儲格式為 YYYY/MM/DD
        const formattedDate = date.replace(/-/g, '/');

        const newItem = { 
          id: Date.now(),
          date: formattedDate, 
          course, 
          todo, 
          note,
          isExam
        };
        scheduleData.push(newItem);
        saveData();
        resetForm();
        updateUniqueMonths();
        updateTicker();
        renderMonthView();
      }

      function editItem(id) {
        const item = scheduleData.find(i => i.id === id);
        if (!item) return;

        isEditing = true;
        document.getElementById("editId").value = id;
        
        const formattedDate = item.date.replace(/\//g, '-');
        document.getElementById("newMonth").value = item.date.substring(5, 7);
        document.getElementById("newDate").value = formattedDate;
        document.getElementById("newCourse").value = item.course;
        document.getElementById("newTodo").value = item.todo;
        document.getElementById("newNote").value = item.note;
        document.getElementById("newIsExam").checked = !!item.isExam;

        formTitle.textContent = "📝 修改系統事件";
        submitBtn.textContent = "更新";
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      function saveEdit() {
        const id = parseInt(document.getElementById("editId").value);
        const date = document.getElementById("newDate").value.trim();
        const course = document.getElementById("newCourse").value.trim();
        const todo = document.getElementById("newTodo").value.trim();
        const note = document.getElementById("newNote").value.trim();
        const isExam = document.getElementById("newIsExam").checked;

        const index = scheduleData.findIndex(i => i.id === id);
        if (index !== -1) {
          const formattedDate = date.replace(/-/g, '/');
          scheduleData[index] = { ...scheduleData[index], date: formattedDate, course, todo, note, isExam };
          saveData();
          resetForm();
          updateUniqueMonths();
          updateTicker();
          renderMonthView();
        }
      }

      function resetForm() {
        isEditing = false;
        document.getElementById("editId").value = "";
        document.getElementById("newMonth").value = "";
        document.getElementById("newDate").value = "";
        document.getElementById("newCourse").value = "";
        document.getElementById("newTodo").value = "";
        document.getElementById("newNote").value = "";
        document.getElementById("newIsExam").checked = false;
        formTitle.textContent = "➕ 初始化新事件";
        submitBtn.textContent = "執行";
      }

      function deleteItem(id) {
        if (confirm("確認刪除此目標數據？")) {
          scheduleData = scheduleData.filter(item => item.id !== id);
          saveData();
          updateUniqueMonths();
          updateTicker();
          renderMonthView();
        }
      }

      function saveData() {
        localStorage.setItem('scheduleData', JSON.stringify(scheduleData));
      }

      // --- 5. 渲染主邏輯 ---
      function renderMonthView() {
        let filteredData = scheduleData;
        
        if (isExamFilterActive) {
          filteredData = filteredData.filter(item => item.isExam);
        }

        // 重新計算 uniqueMonths 以符合過濾條件
        const monthsSet = new Set();
        filteredData.forEach((item) => {
          if (item.date && item.date.length >= 7) {
            monthsSet.add(item.date.substring(0, 7).replace("-", "/"));
          }
        });
        const currentUniqueMonths = Array.from(monthsSet).sort();

        if (currentUniqueMonths.length === 0) {
          renderTable([]);
          monthDisplay.textContent = isExamFilterActive ? "無考試數據" : "無數據";
          togglePagination(false);
          return;
        }

        // 修正 index
        if (currentMonthIndex >= currentUniqueMonths.length) {
          currentMonthIndex = currentUniqueMonths.length - 1;
        }

        const targetMonth = currentUniqueMonths[currentMonthIndex];
        const monthNumber = parseInt(targetMonth.split("/")[1], 10);
        monthDisplay.textContent = monthNumber + "月";

        const monthlyData = filteredData.filter((item) =>
          item.date.replace(/-/g, '/').startsWith(targetMonth)
        );
        
        monthlyData.sort((a, b) => a.date.localeCompare(b.date));
        renderTable(monthlyData);

        prevBtn.disabled = currentMonthIndex === 0;
        nextBtn.disabled = currentMonthIndex === currentUniqueMonths.length - 1;
        togglePagination(true);
      }

      function renderTable(data) {
        tableBody.innerHTML = "";

        if (data.length === 0) {
          tableBody.innerHTML =
            `<tr><td colspan="${isAdmin ? 5 : 4}" class="status-message">[ 未偵測到數據流 ]</td></tr>`;
          return;
        }

        data.forEach((item) => {
          const row = document.createElement("tr");
          let displayDate = item.date.replace(/-/g, '/');
          if (displayDate.includes("/")) {
            const parts = displayDate.split("/");
            if (parts.length >= 3) {
              displayDate = parts[1] + "/" + parts[2];
            }
          }

          row.innerHTML = `
            <td style="font-family: 'JetBrains Mono', monospace;">${displayDate}</td>
            <td style="color: var(--accent-neon); font-weight: bold;">${item.course}</td>
            <td>
              ${item.isExam ? '<span style="background: var(--danger); color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; margin-right: 6px; vertical-align: middle;">考試</span>' : ''}
              ${item.todo}
            </td>
            <td style="color: var(--text-secondary); font-size: 12px;">${item.note || '-'}</td>
            ${isAdmin ? `
              <td>
                <div class="action-btns">
                  <button class="icon-btn" onclick="editItem(${item.id})" title="編輯">✎</button>
                  <button class="icon-btn delete" onclick="deleteItem(${item.id})" title="刪除">✖</button>
                </div>
              </td>
            ` : ""}
          `;
          tableBody.appendChild(row);
        });
      }

      // --- 6. 切換月份 ---
      function changeMonth(direction) {
        const newIndex = currentMonthIndex + direction;
        if (newIndex >= 0 && newIndex < uniqueMonths.length) {
          currentMonthIndex = newIndex;
          renderMonthView();
        }
      }

      // --- 7. 搜尋功能 ---
      searchInput.addEventListener("input", (e) => {
        const keyword = e.target.value.toLowerCase().trim();

        if (keyword === "") {
          isSearching = false;
          renderMonthView();
        } else {
          isSearching = true;
          togglePagination(false);

          const filteredData = scheduleData.filter((item) => {
            return (
              (item.date && item.date.toLowerCase().includes(keyword)) ||
              (item.course && item.course.toLowerCase().includes(keyword)) ||
              (item.todo && item.todo.toLowerCase().includes(keyword)) ||
              (item.note && item.note.toLowerCase().includes(keyword))
            );
          });

          renderTable(filteredData);
          monthDisplay.textContent = "搜尋中";
        }
      });

      function togglePagination(show) {
        const displayStyle = show ? "flex" : "none";
        const controls = document.getElementById("paginationControls");
        if (controls) controls.style.display = displayStyle;
      }

      // 支援 Enter 鍵登入
      document.getElementById("adminPassword").addEventListener("keypress", (e) => {
        if (e.key === "Enter") verifyPassword();
      });

      // 初始化應用
      initApp();

      // 監聽月份選擇，同步更新日期欄位的預設月份
      document.getElementById("newMonth").addEventListener("change", (e) => {
        const m = e.target.value;
        if (m) {
          const dateInput = document.getElementById("newDate");
          const currentYear = new Date().getFullYear();
          // 如果日期欄位還沒填，幫他預填年份跟月份
          if (!dateInput.value) {
            dateInput.value = `${currentYear}-${m}-01`;
          } else {
            const parts = dateInput.value.split("-");
            if (parts.length === 3) {
              parts[1] = m;
              dateInput.value = parts.join("-");
            }
          }
        }
      });
    </script>
  </body>
</html>
